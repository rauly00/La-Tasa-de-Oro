name: Build APK - La Tasa de Oro (OPTIMIZADO Y LIGERO)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Build APK
        run: |
          yes | flet build apk

      - name: Upload APK (LIGERO)
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-ultra
          path: build/app/outputs/flutter-apk/app-release.apk
