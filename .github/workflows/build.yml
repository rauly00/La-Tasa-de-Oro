name: Build APK - La Tasa de Oro (OPTIMIZED)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      # 🔥 LIMPIEZA PROFUNDA (CLAVE)
      - name: Deep clean workspace
        run: |
          rm -rf build
          rm -rf .flet
          rm -rf .dart_tool
          rm -rf flutter
          rm -rf ~/.pub-cache

      # 🚀 BUILD OPTIMIZADO
      - name: Build APK (optimized)
        run: |
          flet build apk --verbose --cleanup-app --clear-cache

      # 🔍 SOLO APK REAL
      - name: Find APK (strict)
        run: |
          find . -type f -name "*.apk" | grep -v "flutter" || true

      # 📦 UPLOAD LIMPIO (CRÍTICO)
      - name: Upload APK (clean only)
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-optimized-apk
          path: |
            **/build/app/outputs/flutter-apk/*.apk
            **/*.apk
