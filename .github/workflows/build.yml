name: Build Android APK (Flet Pro)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: true
      FLET_CLI_NO_ASK: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        run: |
          flet build apk --verbose --no-input

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-apk
          path: build/app/outputs/flutter-apk/
