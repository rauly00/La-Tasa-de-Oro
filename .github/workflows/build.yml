name: Build APK - La Tasa de Oro (ULTRA STABLE)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flutter MANUAL (no prompts)
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
          export PATH="$PWD/flutter/bin:$PATH"
          flutter config --no-analytics
          yes | flutter doctor --android-licenses || true
          flutter doctor -v

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Clean workspace (ULTRA)
        run: |
          rm -rf build
          rm -rf .flet
          rm -rf .dart_tool
          rm -rf .pub-cache

      - name: Build APK (NO prompts)
        run: |
          flet build apk --verbose --clear-cache --cleanup-app --requirements requirements.txt

      - name: Find APK
        run: find . -type f -name "*.apk"

      - name: Upload APK (STRICT)
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-ultra
          path: "**/app-release.apk"
