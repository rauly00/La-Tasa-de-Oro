name: Build APK - La Tasa de Oro

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"
      FLUTTER_SUPPRESS_ANALYTICS: "true"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Flutter compatible con Flet moderno
      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Precache Flutter
        run: flutter precache --android

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK
        run: |
          flet build apk --verbose

      # 🔍 DEBUG: ver si realmente se generó APK
      - name: Find APK files
        run: find . -type f -name "*.apk"

      # 📦 Upload flexible (sin rutas fijas)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-apk
          path: "**/*.apk"
