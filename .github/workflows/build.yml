name: Build APK - La Tasa de Oro (ULTRA LIGHT)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      # 🔥 LIMPIEZA TOTAL
      - name: Clean workspace
        run: |
          rm -rf build
          rm -rf .flet
          rm -rf .dart_tool
          rm -rf flutter
          rm -rf .pub-cache

      # 🚀 BUILD ULTRA OPTIMIZADO
      - name: Build APK (ultra light)
        run: |
          flet build apk --verbose --clear-cache --cleanup-app

      # 📦 SOLO APK REAL
      - name: Upload APK (strict)
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-ultra-apk
          path: "**/app-release.apk"
