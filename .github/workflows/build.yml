name: Build APK - La Tasa de Oro (CAZADOR DE APKs)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Build APK
        run: |
          yes | flet build apk

      - name: Cazar y Limpiar el APK
        run: |
          # Buscar TODOS los archivos .apk reales (ignorando basura)
          APK_REAL=$(find . -type f -name "*.apk" ! -name "*debug*" ! -name "*profile*")
          
          # Mostrar en la consola qué encontró (para que lo veas tú en GitHub)
          echo "========================================="
          echo "APK ENCONTRADO EN: $APK_REAL"
          echo "========================================="
          
          # Verificar tamaño antes de copiar
          ls -lh "$APK_REAL"
          
          # Crear carpeta limpia y copiar
          mkdir dist
          cp "$APK_REAL" dist/LaTasaDeOro.apk

      - name: Upload APK LIMPIO
        uses: actions/upload-artifact@v4
        with:
          name: apk-limpio-final
          path: dist/LaTasaDeOro.apk
