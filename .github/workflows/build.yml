name: Build APK (La Tasa de Oro)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔥 INSTALL FLUTTER (ESTO TE FALTABA)
      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable

      - name: Verify Flutter
        run: flutter doctor

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Build APK
        run: |
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-apk
          path: build/app/outputs/flutter-apk/
