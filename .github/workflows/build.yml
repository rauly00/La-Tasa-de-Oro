name: Build APK - La Tasa de Oro

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"
      FLET_FORCE_ANSWER: "yes"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Install Flutter (manual, NO prompts)
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
          flutter doctor

      - name: Clean project
        run: |
          rm -rf build
          rm -rf .flet

      - name: Build APK
        run: |
          flet build apk --verbose

      - name: Find APK
        run: find . -type f -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-apk
          path: "**/*.apk"
