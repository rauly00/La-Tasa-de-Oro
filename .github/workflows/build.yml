name: Build PRO APK - La Tasa de Oro

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Clean previous builds
        run: |
          rm -rf build dist .flet

      - name: Build Android APK (PRO MODE)
        run: |
          flet build apk --verbose --clean

      - name: Verify APK output
        run: |
          echo "Searching APK..."
          find . -type f -name "*.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: la-tasa-de-oro-pro-apk
          path: "**/*.apk"
