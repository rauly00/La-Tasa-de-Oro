name: Build APK - La Tasa de Oro (LIMPIO)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_CLI_NO_ASK: "true"
      PUB_NON_INTERACTIVE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0

      - name: Build APK
        run: |
          yes | flet build apk

      - name: Extraer y Limpiar el APK
        run: |
          # Creamos una carpeta limpia llamada 'dist'
          mkdir dist
          # Copiamos SOLO el archivo APK final a esa carpeta
          cp build/app/outputs/flutter-apk/app-release.apk dist/LaTasaDeOro.apk
          # Borramos toda la carpeta build para no dejar basura
          rm -rf build

      - name: Upload APK LIMPIO
        uses: actions/upload-artifact@v4
        with:
          name: apk-limpio-final
          # Subimos SOLO la carpeta 'dist' que tiene el archivo limpio
          path: dist/LaTasaDeOro.apk
